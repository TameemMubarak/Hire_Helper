<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HireHelper</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="container">

        <div class="left-panel">
<!-- 
            <img src="hirehelper_loginLogo.png"
                 alt="HireHelper Logo"
                 class="logo"> -->

            <h1>HireHelper</h1>

            <p>
                Connecting people who need help
                with skilled professionals who
                can get the job done.
            </p>

        </div>

        <div class="right-panel">

            <div class="login-card">

                <h2>Welcome Back</h2>

                <p class="subtitle">
                    Sign in to continue
                </p>

                <form>

                    <label>Email Address</label>
                    <input
                        type="email"
                        placeholder="Enter your email"
                        required>

                    <label>Password</label>
                    <input
                        type="password"
                        placeholder="Enter your password"
                        required>

                    <button type="submit">
                        Login
                    </button>

                </form>

                <p class="register">
                    Don't have an account?
                    <a href="#">Register</a>
                </p>

            </div>

        </div>

    </div>

</body>
</html>
